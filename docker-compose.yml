services:
    postgres:
        image: postgres:16-alpine
        container_name: lydia-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: lydia
            POSTGRES_PASSWORD: lydia
            POSTGRES_DB: lydia
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata:
